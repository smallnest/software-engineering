<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>贪吃蛇</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f0f23;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Courier New', monospace;
  }
  #game {
    border: 2px solid #333;
    background: #1a1a2e;
  }
</style>
</head>
<body>
<canvas id="game" width="400" height="400"></canvas>
<script src="snake-game.js"></script>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const GRID = 20;
const SPEED = 200;
const game = new SnakeGame(20, 20);
let timer;

function start() {
  game.reset();
  if (timer) clearInterval(timer);
  timer = setInterval(() => { game.tick(); draw(); }, SPEED);
  draw();
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const { snake, food, score, gameOver } = game.getState();

  snake.forEach((s, i) => {
    ctx.fillStyle = i === 0 ? '#2ecc71' : '#27ae60';
    ctx.fillRect(s.x * GRID + 1, s.y * GRID + 1, GRID - 2, GRID - 2);
  });

  ctx.fillStyle = '#e74c3c';
  ctx.fillRect(food.x * GRID + 1, food.y * GRID + 1, GRID - 2, GRID - 2);

  ctx.fillStyle = '#888';
  ctx.font = '14px "Courier New", monospace';
  ctx.fillText(`分数: ${score}`, 8, 16);

  if (gameOver) {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.65)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = '#e74c3c';
    ctx.font = 'bold 32px "Courier New", monospace';
    ctx.textAlign = 'center';
    ctx.fillText('游戏结束', canvas.width / 2, canvas.height / 2 - 20);

    ctx.fillStyle = '#fff';
    ctx.font = '18px "Courier New", monospace';
    ctx.fillText(`最终分数: ${score}`, canvas.width / 2, canvas.height / 2 + 20);

    ctx.font = '13px "Courier New", monospace';
    ctx.fillText('按空格键重新开始', canvas.width / 2, canvas.height / 2 + 50);
    ctx.textAlign = 'start';
  }
}

document.addEventListener('keydown', e => {
  if (game.getState().gameOver) {
    if (e.key === ' ') { e.preventDefault(); start(); }
    return;
  }
  const dir = { 'ArrowUp': [0,-1], 'ArrowDown': [0,1], 'ArrowLeft': [-1,0], 'ArrowRight': [1,0], w: [0,-1], W: [0,-1], s: [0,1], S: [0,1], a: [-1,0], A: [-1,0], d: [1,0], D: [1,0] }[e.key];
  if (dir) game.setDirection(...dir);
});

start();
</script>
</body>
</html>
